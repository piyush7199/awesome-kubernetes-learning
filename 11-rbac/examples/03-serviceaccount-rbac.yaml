# ServiceAccount RBAC: grant a Pod permission to call the Kubernetes API.
# Use case: a monitoring app that needs to list pods across all namespaces.
#
# Apply:
#   kubectl apply -f 03-serviceaccount-rbac.yaml
#
# Verify the pod can list pods:
#   kubectl exec -n monitoring pod-monitor -- kubectl get pods --all-namespaces
#
# Verify it cannot do more:
#   kubectl exec -n monitoring pod-monitor -- kubectl get secrets
#   # → Error from server (Forbidden)

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring

---
# The ServiceAccount — this is the identity the Pod will use
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-monitor-sa
  namespace: monitoring

---
# ClusterRole: allowed to read pods everywhere
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["namespaces"]   # needed to list namespace names
    verbs: ["get", "list"]

---
# Bind the ClusterRole to the ServiceAccount cluster-wide
# (must be ClusterRoleBinding since we want cross-namespace pod listing)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-monitor-binding
subjects:
  - kind: ServiceAccount
    name: pod-monitor-sa
    namespace: monitoring       # ServiceAccount subjects require a namespace
roleRef:
  kind: ClusterRole
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io

---
# Pod that uses the ServiceAccount
# The token is auto-mounted at /var/run/secrets/kubernetes.io/serviceaccount/token
apiVersion: v1
kind: Pod
metadata:
  name: pod-monitor
  namespace: monitoring
spec:
  serviceAccountName: pod-monitor-sa   # attach the identity
  containers:
    - name: kubectl
      image: bitnami/kubectl:latest
      command:
        - sh
        - -c
        - |
          echo "=== Pods I can see ==="
          kubectl get pods --all-namespaces
          echo ""
          echo "=== Can I get secrets? ==="
          kubectl get secrets --all-namespaces 2>&1 || true
          echo ""
          echo "=== Sleeping... ==="
          sleep 3600
