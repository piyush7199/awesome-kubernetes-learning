# Least-privilege pattern for a production application.
# The app reads its own ConfigMap, writes to a specific Secret,
# and lists pods in its own namespace only.
# Everything else: denied.
#
# This is the recommended production pattern:
# one dedicated ServiceAccount per app, minimum required permissions.
#
# Apply:
#   kubectl apply -f 05-least-privilege-app.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: myapp

---
# Dedicated ServiceAccount — one per application, not shared
apiVersion: v1
kind: ServiceAccount
metadata:
  name: myapp-sa
  namespace: myapp
  # Prevent the default token from being auto-mounted (good practice)
automountServiceAccountToken: false  # we'll mount only where needed

---
# ConfigMap and Secret the app needs
apiVersion: v1
kind: ConfigMap
metadata:
  name: myapp-config
  namespace: myapp
data:
  log-level: "info"
  max-connections: "100"

---
apiVersion: v1
kind: Secret
metadata:
  name: myapp-state
  namespace: myapp
type: Opaque
data:
  last-run: ""   # app writes here

---
# Minimal Role: only what this specific app needs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: myapp-role
  namespace: myapp
rules:
  # Read its own ConfigMap only
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["myapp-config"]   # restricts to a specific named resource
    verbs: ["get", "watch"]

  # Write to its own Secret only
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["myapp-state"]
    verbs: ["get", "update", "patch"]

  # List pods in its own namespace (for health checks)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: myapp-role-binding
  namespace: myapp
subjects:
  - kind: ServiceAccount
    name: myapp-sa
    namespace: myapp
roleRef:
  kind: Role
  name: myapp-role
  apiGroup: rbac.authorization.k8s.io

---
# Deployment using the ServiceAccount
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp
  namespace: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      serviceAccountName: myapp-sa
      automountServiceAccountToken: true   # override the SA-level false — needed here
      containers:
        - name: app
          image: bitnami/kubectl:latest
          command:
            - sh
            - -c
            - |
              echo "=== My ConfigMap ==="
              kubectl get configmap myapp-config -o yaml
              echo ""
              echo "=== Pods in my namespace ==="
              kubectl get pods -n myapp
              echo ""
              echo "=== Can I access other namespaces? ==="
              kubectl get pods -n default 2>&1 || true
              sleep 3600
