# OOMKill demonstration — intentionally set a memory limit too low.
# The container will allocate more memory than the limit and get killed.
# Watch with: kubectl get pod oomkill-demo -w
#
# Expected behaviour:
#   Running → OOMKilled → (restart) → Running → OOMKilled → CrashLoopBackOff
#
# WARNING: for learning purposes only — don't use patterns like this in production.

apiVersion: v1
kind: Pod
metadata:
  name: oomkill-demo
spec:
  containers:
    - name: memory-hog
      image: polinux/stress   # stress-testing tool image
      # Allocate 150MB of memory — but limit is only 64Mi
      # The kernel will OOMKill this container
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "150M", "--vm-hang", "1"]
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"    # container will try to use 150MB — limit is 64MB → OOMKill
          cpu: "200m"
