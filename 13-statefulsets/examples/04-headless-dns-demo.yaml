# DNS demo: prove that each StatefulSet pod gets its own DNS name.
# After applying, run a busybox pod and resolve each pod by name.
#
# Apply:
#   kubectl apply -f 04-headless-dns-demo.yaml
#
# Once pods are Running, test DNS from a debug pod:
#   kubectl run dns-test --image=busybox:1.36 --rm -it -- sh
#
# Inside the debug pod:
#   # Resolve each pod individually
#   nslookup dns-demo-0.dns-demo.default.svc.cluster.local
#   nslookup dns-demo-1.dns-demo.default.svc.cluster.local
#   nslookup dns-demo-2.dns-demo.default.svc.cluster.local
#
#   # Resolving the headless service returns ALL pod IPs (round-robin DNS)
#   nslookup dns-demo.default.svc.cluster.local
#
# Notice: each pod-specific query returns ONE IP (that pod's IP).
# The service-level query returns ALL three pod IPs.
# This is how clustered databases peer-discover each other.

---
apiVersion: v1
kind: Service
metadata:
  name: dns-demo
spec:
  clusterIP: None
  selector:
    app: dns-demo
  ports:
    - port: 80

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dns-demo
spec:
  serviceName: dns-demo
  replicas: 3
  selector:
    matchLabels:
      app: dns-demo
  template:
    metadata:
      labels:
        app: dns-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          # Each pod serves its own hostname in the response body
          command:
            - sh
            - -c
            - |
              echo "server { listen 80; location / { return 200 '$HOSTNAME\n'; } }" \
                > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
