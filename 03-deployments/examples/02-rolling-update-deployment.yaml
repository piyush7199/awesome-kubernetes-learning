apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app-tuned
  annotations:
    kubernetes.io/change-cause: "nginx 1.25 with zero-downtime rolling update config"
spec:
  replicas: 4

  selector:
    matchLabels:
      app: web-app-tuned

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # at most 4+1=5 pods exist during the update
      maxUnavailable: 0    # never drop below 4 — zero downtime guaranteed

  revisionHistoryLimit: 5  # keep last 5 ReplicaSets for rollback (default is 10)

  template:
    metadata:
      labels:
        app: web-app-tuned
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
