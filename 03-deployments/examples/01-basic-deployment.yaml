apiVersion: apps/v1        # Deployment is in the 'apps' group, not core 'v1'
kind: Deployment
metadata:
  name: web-app
  labels:
    app: web-app
  annotations:
    kubernetes.io/change-cause: "Initial deployment — nginx 1.25"  # shows in rollout history
spec:
  replicas: 3              # always keep 3 pods running

  selector:
    matchLabels:
      app: web-app         # the Deployment owns pods with this label

  template:                # everything below here is the pod definition
    metadata:
      labels:
        app: web-app       # must match selector.matchLabels above
    spec:
      containers:
        - name: nginx
          image: nginx:1.25          # always pin a specific tag — never use 'latest'
          ports:
            - containerPort: 80
