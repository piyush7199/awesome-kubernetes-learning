# nginx-ingress annotations reference.
# This shows commonly used annotations in one place.
# Apply only to a cluster with nginx-ingress controller installed.
#
# Note: annotations are controller-specific.
# These only work with kubernetes/ingress-nginx.
# Traefik, HAProxy, etc. use completely different annotations.

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: annotated-ingress
  annotations:
    # ── URL rewriting ────────────────────────────────────────────────
    # Strip the matched path prefix before forwarding.
    # Without this, /api/users is forwarded as /api/users.
    # With this, /api/users is forwarded as /users.
    # The ($2) captures everything after the prefix via regex in the path.
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # ── Rate limiting ────────────────────────────────────────────────
    # Limit requests per second per IP
    nginx.ingress.kubernetes.io/limit-rps: "20"

    # ── CORS ────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://myapp.example.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, OPTIONS"

    # ── TLS redirect ─────────────────────────────────────────────────
    # Redirect all HTTP to HTTPS
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

    # ── Timeouts ─────────────────────────────────────────────────────
    # Read timeout: useful for long-running API calls or WebSockets
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"

    # ── Body size ────────────────────────────────────────────────────
    # Max request body (e.g. file uploads). Default is 1m.
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"

    # ── Session affinity (sticky sessions) ───────────────────────────
    # Route a client to the same Pod using a cookie
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "INGRESSCOOKIE"
    nginx.ingress.kubernetes.io/session-cookie-expires: "172800"

spec:
  ingressClassName: nginx
  rules:
    - host: myapp.example.com
      http:
        paths:
          # The regex (/api)(/|$)(.*) with rewrite-target: /$2$3
          # correctly strips the /api prefix.
          # path: /api/users → forwarded as /users
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific  # required for regex paths in nginx-ingress
            backend:
              service:
                name: api-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
