# Basic Ingress with path-based routing.
#
# Prerequisites (Minikube):
#   minikube addons enable ingress
#   kubectl apply -f 01-basic-ingress.yaml
#   echo "$(minikube ip) myapp.example.com" | sudo tee -a /etc/hosts
#
# Then test:
#   curl http://myapp.example.com/
#   curl http://myapp.example.com/api

---
# Backend service 1: a simple frontend (nginx)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
  # ClusterIP (not LoadBalancer) — Ingress routes to it internally

---
# Backend service 2: a simple API (nginx on port 8080 for demo)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-backend
  template:
    metadata:
      labels:
        app: api-backend
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          # Serve a custom response so you can see traffic is routed correctly
          command:
            - sh
            - -c
            - |
              echo "server { listen 80; location / { return 200 'API response\n'; } }" \
                > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api-backend
  ports:
    - port: 80
      targetPort: 80

---
# The Ingress resource — routing rules
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app-ingress
  annotations:
    # Strip the /api prefix before forwarding to the backend.
    # Without this, the backend receives /api/... which it may not expect.
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx    # must match your installed IngressClass
  rules:
    - host: myapp.example.com
      http:
        paths:
          - path: /api       # matches /api, /api/users, /api/v2, etc.
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80
          - path: /          # catch-all: everything not matched above
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
