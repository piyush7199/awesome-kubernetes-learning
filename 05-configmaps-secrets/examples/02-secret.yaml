apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
type: Opaque

# stringData — write plain text, Kubernetes base64-encodes it automatically.
# When you kubectl get secret -o yaml, you'll see 'data:' with base64 values.
# Use stringData in your manifests to avoid manual encoding errors.
stringData:
  username: admin
  password: "Sup3r$ecret!Passw0rd"
  connection-string: "postgresql://admin:Sup3r$ecret!Passw0rd@postgres-service:5432/mydb"
