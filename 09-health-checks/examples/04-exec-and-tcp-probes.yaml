# Exec and TCP socket probe examples.

---
# TCP socket probe — used for non-HTTP services.
# Checks if a port accepts a TCP connection.
# Here: nginx listens on 80; TCP probe succeeds if the port is open.
apiVersion: v1
kind: Pod
metadata:
  name: tcp-probe-demo
spec:
  containers:
    - name: nginx
      image: nginx:1.25
      livenessProbe:
        tcpSocket:
          port: 80           # TCP handshake on port 80 = success
        initialDelaySeconds: 5
        periodSeconds: 10

---
# Exec probe — runs a command inside the container.
# Useful when you want to run a real health check command.
# Success = exit code 0.
apiVersion: v1
kind: Pod
metadata:
  name: exec-probe-demo
spec:
  containers:
    - name: app
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          # Write a ready file after 10 seconds, then keep running
          sleep 10 && touch /tmp/ready && sleep 3600
      livenessProbe:
        exec:
          command:
            - test          # shell 'test' command
            - -f            # check if file exists
            - /tmp/ready    # exists once app has initialised
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
      readinessProbe:
        exec:
          command: ["test", "-f", "/tmp/ready"]
        initialDelaySeconds: 0
        periodSeconds: 5
