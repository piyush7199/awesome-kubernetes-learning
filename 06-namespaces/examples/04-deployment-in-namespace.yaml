# A deployment that lives in the 'dev' namespace.
# Notice: namespace is declared in metadata — this makes the intent explicit
# and is preferred over relying on kubectl -n flags.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dev        # explicitly scoped to 'dev'
  labels:
    app: api
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        env: dev
    spec:
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            # Required because ResourceQuota is active in 'dev'
            # LimitRange would inject these automatically if omitted,
            # but declaring explicitly is better practice.
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# A Service in the same namespace — reachable as 'api' from within 'dev'
# and as 'api.dev' or 'api.dev.svc.cluster.local' from other namespaces
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: dev
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: 80
