# DaemonSet on a subset of nodes using nodeSelector.
# Only deploys to nodes labeled with: hardware=gpu
#
# First, label a node:
#   kubectl label node <node-name> hardware=gpu
#
# Then apply:
#   kubectl apply -f 04-node-subset-daemonset.yaml
#
# On Minikube (single node), label the minikube node:
#   kubectl label node minikube hardware=gpu
#
# Verify:
#   kubectl get pods -l app=gpu-monitor -o wide
#
# Remove the label — the Pod is evicted:
#   kubectl label node minikube hardware-   (the trailing dash removes the label)
#   kubectl get pods -l app=gpu-monitor     (Pod terminates)
#
# Re-label — the Pod is scheduled again:
#   kubectl label node minikube hardware=gpu
#   kubectl get pods -l app=gpu-monitor     (Pod starts)

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-monitor
spec:
  selector:
    matchLabels:
      app: gpu-monitor
  template:
    metadata:
      labels:
        app: gpu-monitor
    spec:
      nodeSelector:
        hardware: gpu       # only schedule on nodes with this label

      containers:
        - name: gpu-stats
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "GPU monitoring agent running on: ${NODE_NAME}"
              # In production: nvidia-smi, AMD ROCm stats, etc.
              sleep 3600
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
