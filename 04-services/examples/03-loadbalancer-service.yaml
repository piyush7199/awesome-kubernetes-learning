# LoadBalancer Service — production external access via cloud load balancer
# Works on: GKE, EKS, AKS, and any cloud with a cloud-controller-manager.
# On Minikube: run `minikube tunnel` in a separate terminal to simulate.
#
# Traffic flow:
#   Internet ──► Cloud LB (public IP) ──► NodePort ──► ClusterIP ──► pods

apiVersion: v1
kind: Service
metadata:
  name: web-loadbalancer
  annotations:
    # Cloud-specific annotations go here.
    # AWS example (creates an NLB instead of classic ELB):
    # service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    # GCP example (use a specific static IP you reserved):
    # cloud.google.com/load-balancer-ip: "34.100.200.10"
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - name: http
      port: 80          # external port (what users hit)
      targetPort: 8080  # container port
    - name: https
      port: 443
      targetPort: 8443
